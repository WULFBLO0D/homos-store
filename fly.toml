app = 'homos-store'
primary_region = 'ams'

[build]

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = '5s'
  interval = '10s'
  method = 'GET'
  timeout = '2s'
  path = '/api/status'

[[mounts]]
  source = 'data'
  destination = '/data'
